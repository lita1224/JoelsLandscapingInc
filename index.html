<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Work Test</title>
<style>
body { font-family: Arial; margin:0; padding:0; background:#f9f9f9; }
section { padding:80px 20px; max-width:1200px; margin:auto; text-align:center; }
h2 { margin-bottom:20px; }

/* Flip Cards */
.flip-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  justify-items: center;
}

.flip-card {
  perspective: 1000px;
  width: 100%;
  max-width: 300px;
}

.flip-card-inner {
  position: relative;
  width: 100%;
  transition: transform 0.8s;
  transform-style: preserve-3d;
}

.flip-card:hover .flip-card-inner {
  transform: rotateY(-180deg); /* Book-style flip */
}

.flip-card-front,
.flip-card-back {
  position: absolute;
  width: 100%;
  backface-visibility: hidden;
  border-radius: 10px;
  overflow: hidden;
}

.flip-card-front img { width:100%; display:block; }
.flip-card-back img, .flip-card-back video { width:100%; display:block; border-radius:10px; }
.flip-card-back { transform: rotateY(180deg); display:flex; justify-content:center; align-items:center; background:#4CAF50; color:white; padding:10px; }

/* Add space after cards so contact section doesn't overlap */
.spacer { height:50px; }
</style>
</head>
<body>

<section id="portfolio">
  <h2>Our Work</h2>

  <div class="flip-container">
    <!-- Card 1: image -->
    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img src="work-sample.jpg" alt="Project 1">
        </div>
        <div class="flip-card-back">
          <img src="work-sample2.jpg" alt="Project 1 Back">
        </div>
      </div>
    </div>

    <!-- Card 2: image -->
    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img src="work-sample2.jpg" alt="Project 2">
        </div>
        <div class="flip-card-back">
          <video src="work-video.mp4" autoplay muted loop></video>
        </div>
      </div>
    </div>

    <!-- Card 3: image -->
    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img src="work-sample2.jpg" alt="Project 3">
        </div>
        <div class="flip-card-back">
          <p>More Projects Coming Soon!</p>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="spacer"></div>

<section id="contact">
  <h2>Contact Us</h2>
  <p>Email: JoelsLandscapingllc@gmail.com</p>
  <p>Phone: (386) 564-6555</p>
</section>

</body>
</html>
