<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Work Carousel</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; text-align:center; }
section { padding:80px 20px; max-width:600px; margin:auto; }

/* Card */
.card-container { position: relative; width: 100%; max-width: 400px; margin: auto; }
.card { border-radius: 10px; overflow: hidden; background:#4CAF50; color:white; position: relative; }
.card img, .card video { width:100%; display:block; border-radius:10px; }

/* Buttons */
button { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color:white; border:none; font-size:1.5rem; padding:10px; cursor:pointer; border-radius:5px; }
#prev { left:-50px; }
#next { right:-50px; }
button:hover { background: rgba(0,0,0,0.8); }

/* Spacer for contact section */
.spacer { height:50px; }
</style>
</head>
<body>

<section id="portfolio">
  <h2>Our Work</h2>

  <div class="card-container">
    <div class="card" id="card">
      <img src="work-sample.jpg" alt="Project 1" id="card-media">
    </div>
    <button id="prev">&#10094;</button>
    <button id="next">&#10095;</button>
  </div>
</section>

<div class="spacer"></div>

<section id="contact">
  <h2>Contact Us</h2>
  <p>Email: JoelsLandscapingllc@gmail.com</p>
  <p>Phone: (386) 564-6555</p>
</section>

<script>
const mediaList = [
  { type:'image', src:'work-sample.jpg' },
  { type:'image', src:'work-sample2.jpg' },
  { type:'video', src:'work-video.mp4' }
];

let currentIndex = 0;
const cardMedia = document.getElementById('card-media');

function showCard(index) {
  const item = mediaList[index];
  const cardContainer = document.getElementById('card');
  cardContainer.innerHTML = '';

  if(item.type === 'image') {
    const img = document.createElement('img');
    img.src = item.src;
    img.alt = `Project ${index+1}`;
    cardContainer.appendChild(img);
  } else if(item.type === 'video') {
    const vid = document.createElement('video');
    vid.src = item.src;
    vid.autoplay = true;
    vid.muted = true;
    vid.loop = true;
    cardContainer.appendChild(vid);
  }
}

// Initial display
showCard(currentIndex);

// Button events
document.getElementById('prev').addEventListener('click', ()=>{
  currentIndex = (currentIndex - 1 + mediaList.length) % mediaList.length;
  showCard(currentIndex);
});
document.getElementById('next').addEventListener('click', ()=>{
  currentIndex = (currentIndex + 1) % mediaList.length;
  showCard(currentIndex);
});
</script>

</body>
</html>
